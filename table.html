<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: linear-gradient(
                120deg,
                rgb(255, 102, 0),
                rgb(124, 128, 0),
                rgb(208, 255, 0),
                rgb(115, 255, 0),
                rgb(193, 255, 192),
                rgb(42, 165, 122)

            );
            background-size: 600% 600%;
            animation: gd 8s ease infinite;
            height: auto;
            width: 100%;

        }
        @keyframes gd {
            0% ,
            100%{
                background-position: 50%;
            }
            50%{
                background-position: 100%;
            }
        }
        
        .container{
            border-radius: 10px;
            box-shadow: 0px 10px 40px;
            width: auto;
            padding: 20px;
            margin: 20px;
        }

        table{
          border-collapse: collapse;
          padding: 20px;
          text-align: center;
          width: 100%;
        }
       td{
        padding: 20px;
       }
       td::before{
        content: "😺";
       }
       thead{
        background-color: aqua;
       }
      th{
        padding: 15px;
        border-radius: 10px;
        text-transform: uppercase;
      }
      tbody tr:nth-child(even){
        background-color: lightcoral;
      }
      table:hover{
        cursor: pointer;
      }
      td:hover{
        font-style: italic;
        font-weight: bold;
        transform: scale(1.3);
      }


    </style>
</head>
<body>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>age</th>
                    <th>courese</th>
                    <th>grade</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>pranali</td>
                    <td>20</td>
                    <td>IT</td>
                    <td>A</td>
                </tr>

                <tr>
                    <td>pranali</td>
                    <td>20</td>
                    <td>IT</td>
                    <td>A</td>
                </tr>

                 <tr>
                    <td>pranali</td>
                    <td>20</td>
                    <td>IT</td>
                    <td>A</td>
                </tr>
                 <tr>
                    <td>pranali</td>
                    <td>20</td>
                    <td>IT</td>
                    <td>A</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
